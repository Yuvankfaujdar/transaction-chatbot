<!DOCTYPE html>
<html>
<head>
<title>Transaction Chatbot</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
}

.container{
width:600px;
margin:50px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.chat{
height:400px;
overflow-y:auto;
border:1px solid #ddd;
padding:10px;
margin-bottom:10px;
}

.message{
margin:10px 0;
}

.user{
text-align:right;
color:#007bff;
}

.bot{
text-align:left;
color:#333;
}

.input-row{
display:flex;
gap:10px;
}

input{
flex:1;
padding:10px;
font-size:16px;
}

button{
padding:10px 20px;
background:#007bff;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

</style>

</head>

<body>

<div class="container">

<h2>💬 Chat with your Transactions</h2>

<div id="chat" class="chat"></div>

<div class="input-row">

<input id="message" placeholder="Ask something about your transactions">

<button onclick="sendMessage()">Send</button>

</div>

</div>

<script>

async function sendMessage(){

const messageInput = document.getElementById("message")
const message = messageInput.value

if(message.trim()==="") return

const chatDiv = document.getElementById("chat")

chatDiv.innerHTML += `
<div class="message user">
<b>You:</b> ${message}
</div>
`

messageInput.value=""

const response = await fetch("http://127.0.0.1:8000/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
user_id:1,
question:message
})

})

const data = await response.json()

chatDiv.innerHTML += `
<div class="message bot">
<b>Bot:</b> ${data.answer}
</div>
`

chatDiv.scrollTop = chatDiv.scrollHeight

}

document.getElementById("message").addEventListener("keypress",function(e){

if(e.key==="Enter"){
sendMessage()
}

})

</script>

</body>
</html>
